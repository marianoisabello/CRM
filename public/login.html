<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dana - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.3); }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center font-sans antialiased">
  <!-- Background pattern -->
  <div class="fixed inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-gray-900 via-gray-950 to-gray-950"></div>
  
  <div class="w-full max-w-sm relative z-10 px-4">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-violet-500 to-violet-700 flex items-center justify-center font-bold text-2xl mx-auto mb-4 shadow-xl shadow-violet-900/30">D</div>
      <h1 class="text-2xl font-semibold text-white">Marketing Dana</h1>
      <p class="text-gray-500 text-[13px] mt-1">CRM · Plataforma de Agentes IA</p>
    </div>

    <!-- Login Card -->
    <div class="bg-gray-900/80 border border-gray-800/80 rounded-2xl p-8 backdrop-blur-sm shadow-2xl">
      <form id="login-form" class="space-y-5">
        <div>
          <label class="text-[11px] text-gray-500 uppercase tracking-wider mb-1.5 block font-medium">Email</label>
          <input id="email" type="email" required placeholder="admin@tudominio.com"
            class="w-full bg-gray-800/60 border border-gray-700/60 rounded-lg px-4 py-3 text-[13px] text-gray-200 placeholder-gray-500 transition-colors">
        </div>
        <div>
          <label class="text-[11px] text-gray-500 uppercase tracking-wider mb-1.5 block font-medium">Password</label>
          <input id="password" type="password" required placeholder="********"
            class="w-full bg-gray-800/60 border border-gray-700/60 rounded-lg px-4 py-3 text-[13px] text-gray-200 placeholder-gray-500 transition-colors">
        </div>
        <p id="error-msg" class="text-red-400 text-[13px] hidden flex items-center gap-1.5">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span id="error-text"></span>
        </p>
        <button type="submit"
          class="w-full bg-violet-600 hover:bg-violet-500 transition-colors rounded-lg py-3 text-[13px] font-semibold text-white flex items-center justify-center gap-2">
          <span id="btn-text">Ingresar</span>
          <svg id="btn-spinner" class="w-4 h-4 hidden animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        </button>
      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-600 text-[11px] mt-6">CRM Dana - Sistema de gestion de leads</p>
  </div>

  <script>
    // Si ya hay token, ir directo al app
    if (localStorage.getItem('crm_token')) window.location.href = '/app.html';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      const btnText = document.getElementById('btn-text');
      const btnSpinner = document.getElementById('btn-spinner');
      
      btnText.textContent = 'Ingresando...';
      btnSpinner.classList.remove('hidden');
      btn.disabled = true;
      btn.classList.add('opacity-70');

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (data.ok) {
        localStorage.setItem('crm_token', data.token);
        localStorage.setItem('crm_user', JSON.stringify(data.user));
        window.location.href = '/app.html';
      } else {
        document.getElementById('error-text').textContent = data.error;
        document.getElementById('error-msg').classList.remove('hidden');
        btnText.textContent = 'Ingresar';
        btnSpinner.classList.add('hidden');
        btn.disabled = false;
        btn.classList.remove('opacity-70');
      }
    });
  </script>
</body>
</html>
