<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dana — Panel de Leads</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .badge { @apply text-xs font-semibold px-2 py-0.5 rounded-full; }
    .spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center font-bold text-sm">D</div>
      <span class="font-semibold text-lg">Marketing Dana — CRM</span>
    </div>
    <button onclick="loadAll()" class="text-sm text-gray-400 hover:text-white transition flex items-center gap-1">
      <svg id="refresh-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Actualizar
    </button>
  </header>

  <main class="p-6 max-w-7xl mx-auto space-y-6">

    <!-- Stats -->
    <div id="stats-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 animate-pulse h-24"></div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 animate-pulse h-24"></div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 animate-pulse h-24"></div>
      <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 animate-pulse h-24"></div>
    </div>

    <!-- Filtros -->
    <div class="flex flex-wrap gap-3 items-center">
      <select id="filter-classification" onchange="applyFilters()"
        class="bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-violet-500">
        <option value="">Todas las clasificaciones</option>
        <option value="hot">🔥 Hot</option>
        <option value="warm">☀️ Warm</option>
        <option value="cold">❄️ Cold</option>
        <option value="unqualified">✗ No calificado</option>
      </select>

      <select id="filter-status" onchange="applyFilters()"
        class="bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-violet-500">
        <option value="">Todos los estados</option>
        <option value="new">Nuevo</option>
        <option value="contacted">Contactado</option>
        <option value="qualified">Calificado</option>
        <option value="won">Ganado</option>
        <option value="lost">Perdido</option>
      </select>

      <select id="filter-source" onchange="applyFilters()"
        class="bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-sm text-gray-300 focus:outline-none focus:border-violet-500">
        <option value="">Todas las fuentes</option>
        <option value="web_form">Formulario web</option>
        <option value="manychat">ManyChat</option>
        <option value="instagram">Instagram</option>
        <option value="whatsapp">WhatsApp</option>
        <option value="linkedin">LinkedIn</option>
        <option value="email">Email</option>
        <option value="database_import">Importación</option>
      </select>

      <span id="leads-count" class="ml-auto text-sm text-gray-500"></span>
    </div>

    <!-- Tabla -->
    <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
            <th class="text-left px-4 py-3">Lead</th>
            <th class="text-left px-4 py-3">Fuente</th>
            <th class="text-left px-4 py-3">Score</th>
            <th class="text-left px-4 py-3">Clasificación</th>
            <th class="text-left px-4 py-3">Próxima acción</th>
            <th class="text-left px-4 py-3">Estado</th>
            <th class="text-left px-4 py-3">Fecha</th>
            <th class="px-4 py-3"></th>
          </tr>
        </thead>
        <tbody id="leads-table">
          <tr><td colspan="8" class="text-center py-12 text-gray-500">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

  </main>

  <!-- Modal detalle -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg p-6 space-y-4">
      <div class="flex items-start justify-between">
        <h2 id="modal-name" class="font-semibold text-lg"></h2>
        <button onclick="closeModal()" class="text-gray-500 hover:text-white">✕</button>
      </div>
      <div id="modal-body" class="space-y-3 text-sm text-gray-300"></div>
      <div class="border-t border-gray-800 pt-4">
        <p class="text-xs text-gray-500 mb-2">Cambiar estado</p>
        <div class="flex gap-2 flex-wrap" id="modal-status-buttons"></div>
      </div>
    </div>
  </div>

  <script>
    const API = '';
    let currentLeadId = null;

    const classColors = {
      hot:         'bg-red-900/50 text-red-300 border border-red-800',
      warm:        'bg-amber-900/50 text-amber-300 border border-amber-800',
      cold:        'bg-blue-900/50 text-blue-300 border border-blue-800',
      unqualified: 'bg-gray-800 text-gray-400 border border-gray-700',
    };

    const classEmoji = { hot: '🔥', warm: '☀️', cold: '❄️', unqualified: '✗' };

    const statusColors = {
      new:       'bg-violet-900/50 text-violet-300 border border-violet-800',
      contacted: 'bg-sky-900/50 text-sky-300 border border-sky-800',
      qualified: 'bg-emerald-900/50 text-emerald-300 border border-emerald-800',
      won:       'bg-green-900/50 text-green-300 border border-green-800',
      lost:      'bg-gray-800 text-gray-500 border border-gray-700',
    };

    const statusLabel = { new: 'Nuevo', contacted: 'Contactado', qualified: 'Calificado', won: 'Ganado', lost: 'Perdido' };

    const sourceLabel = {
      web_form: '🌐 Web', manychat: '💬 ManyChat', instagram: '📸 Instagram',
      whatsapp: '📱 WhatsApp', linkedin: '💼 LinkedIn', email: '✉️ Email', database_import: '📂 Importación',
    };

    const actionLabel = {
      schedule_meeting: '📅 Agendar reunión',
      send_info: '📄 Enviar info',
      nurture: '🌱 Nutrir',
      discard: '🗑️ Descartar',
    };

    const scoreBar = (score) => {
      if (!score && score !== 0) return '<span class="text-gray-600">—</span>';
      const color = score >= 65 ? 'bg-red-500' : score >= 40 ? 'bg-amber-500' : 'bg-blue-500';
      return `
        <div class="flex items-center gap-2">
          <div class="w-16 h-1.5 bg-gray-800 rounded-full overflow-hidden">
            <div class="${color} h-full rounded-full" style="width:${score}%"></div>
          </div>
          <span class="text-gray-300 font-mono">${score}</span>
        </div>`;
    };

    async function loadStats() {
      const res = await fetch(`${API}/api/leads/stats`);
      const { stats } = await res.json();
      const c = stats.by_classification;
      document.getElementById('stats-grid').innerHTML = `
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
          <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">Total leads</p>
          <p class="text-3xl font-bold">${stats.total}</p>
        </div>
        <div class="bg-gray-900 border border-red-900/40 rounded-xl p-4">
          <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">🔥 Hot</p>
          <p class="text-3xl font-bold text-red-400">${c.hot || 0}</p>
        </div>
        <div class="bg-gray-900 border border-amber-900/40 rounded-xl p-4">
          <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">☀️ Warm</p>
          <p class="text-3xl font-bold text-amber-400">${c.warm || 0}</p>
        </div>
        <div class="bg-gray-900 border border-blue-900/40 rounded-xl p-4">
          <p class="text-gray-500 text-xs uppercase tracking-wider mb-1">❄️ Cold</p>
          <p class="text-3xl font-bold text-blue-400">${c.cold || 0}</p>
        </div>`;
    }

    async function loadLeads() {
      const classification = document.getElementById('filter-classification').value;
      const status = document.getElementById('filter-status').value;
      const source = document.getElementById('filter-source').value;

      const params = new URLSearchParams();
      if (classification) params.set('classification', classification);
      if (status) params.set('status', status);
      if (source) params.set('source', source);
      params.set('limit', '100');

      const res = await fetch(`${API}/api/leads?${params}`);
      const { leads } = await res.json();

      document.getElementById('leads-count').textContent = `${leads.length} leads`;

      if (!leads.length) {
        document.getElementById('leads-table').innerHTML =
          '<tr><td colspan="8" class="text-center py-12 text-gray-500">Sin leads con estos filtros</td></tr>';
        return;
      }

      document.getElementById('leads-table').innerHTML = leads.map(l => `
        <tr class="border-t border-gray-800/60 hover:bg-gray-800/40 transition cursor-pointer" onclick="openModal('${l.id}')">
          <td class="px-4 py-3">
            <p class="font-medium text-white">${l.name || '<span class="text-gray-500">Sin nombre</span>'}</p>
            <p class="text-gray-500 text-xs">${l.email || l.contact || ''}</p>
          </td>
          <td class="px-4 py-3 text-gray-400">${sourceLabel[l.source] || l.source}</td>
          <td class="px-4 py-3">${scoreBar(l.score)}</td>
          <td class="px-4 py-3">
            ${l.classification
              ? `<span class="badge ${classColors[l.classification]}">${classEmoji[l.classification]} ${l.classification}</span>`
              : '<span class="text-gray-600 text-xs">Pendiente SDR</span>'}
          </td>
          <td class="px-4 py-3 text-gray-400 text-xs">${actionLabel[l.next_action] || '—'}</td>
          <td class="px-4 py-3">
            <span class="badge ${statusColors[l.status] || ''}">${statusLabel[l.status] || l.status}</span>
          </td>
          <td class="px-4 py-3 text-gray-500 text-xs">${new Date(l.created_at).toLocaleDateString('es-AR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}</td>
          <td class="px-4 py-3 text-gray-600">›</td>
        </tr>`).join('');
    }

    function applyFilters() { loadLeads(); }

    async function loadAll() {
      const icon = document.getElementById('refresh-icon');
      icon.classList.add('spinning');
      await Promise.all([loadStats(), loadLeads()]);
      icon.classList.remove('spinning');
    }

    // ── Modal ────────────────────────────────────────────────────────────────

    async function openModal(id) {
      currentLeadId = id;
      const res = await fetch(`${API}/api/leads?limit=100`);
      const { leads } = await res.json();
      const l = leads.find(x => x.id === id);
      if (!l) return;

      document.getElementById('modal-name').textContent = l.name || 'Sin nombre';
      document.getElementById('modal-body').innerHTML = `
        <div class="grid grid-cols-2 gap-3">
          <div><p class="text-gray-500 text-xs mb-0.5">Email</p><p>${l.email || '—'}</p></div>
          <div><p class="text-gray-500 text-xs mb-0.5">Contacto</p><p>${l.contact || '—'}</p></div>
          <div><p class="text-gray-500 text-xs mb-0.5">Fuente</p><p>${sourceLabel[l.source] || l.source}</p></div>
          <div><p class="text-gray-500 text-xs mb-0.5">Score SDR</p><p>${scoreBar(l.score)}</p></div>
          <div><p class="text-gray-500 text-xs mb-0.5">Clasificación</p>
            <p>${l.classification ? `<span class="badge ${classColors[l.classification]}">${classEmoji[l.classification]} ${l.classification}</span>` : '—'}</p>
          </div>
          <div><p class="text-gray-500 text-xs mb-0.5">Próxima acción</p><p>${actionLabel[l.next_action] || '—'}</p></div>
        </div>
        ${l.sdr_notes ? `<div class="mt-2 bg-gray-800/60 rounded-lg p-3">
          <p class="text-gray-500 text-xs mb-1">Notas del SDR</p>
          <p class="text-gray-300 whitespace-pre-wrap text-xs">${l.sdr_notes}</p>
        </div>` : ''}`;

      const statuses = ['new','contacted','qualified','won','lost'];
      document.getElementById('modal-status-buttons').innerHTML = statuses.map(s => `
        <button onclick="changeStatus('${id}','${s}')"
          class="badge ${s === l.status ? statusColors[s] : 'bg-gray-800 text-gray-500 border border-gray-700'} cursor-pointer hover:opacity-80 transition py-1 px-3">
          ${statusLabel[s]}
        </button>`).join('');

      document.getElementById('modal').classList.remove('hidden');
    }

    async function changeStatus(id, status) {
      await fetch(`${API}/api/leads/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status }),
      });
      closeModal();
      loadAll();
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      currentLeadId = null;
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('modal')) closeModal();
    });

    // Arrancar
    loadAll();

    // Auto-refresh cada 30 segundos
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
