<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Dana</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .nav-item { @apply flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-gray-400 hover:text-white hover:bg-gray-800 transition cursor-pointer; }
    .nav-item.active { @apply bg-violet-900/50 text-violet-300 border border-violet-800/50; }
    .nav-section { @apply text-xs text-gray-600 uppercase tracking-widest px-3 mt-5 mb-1; }
    .badge { @apply text-xs font-semibold px-2 py-0.5 rounded-full; }
    .card { @apply bg-gray-900 border border-gray-800 rounded-xl p-5; }
    .spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-60 min-h-screen bg-gray-900 border-r border-gray-800 flex flex-col fixed left-0 top-0 z-30">
    <!-- Logo -->
    <div class="px-4 py-5 border-b border-gray-800 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center font-bold text-sm shrink-0">D</div>
      <div>
        <p class="font-semibold text-sm leading-tight">Marketing Dana</p>
        <p class="text-xs text-gray-500">CRM · Agentes IA</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto px-3 py-3">
      <div onclick="navigate('dashboard')" class="nav-item" data-view="dashboard">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </div>

      <p class="nav-section">Leads por canal</p>
      <div onclick="navigate('leads')" class="nav-item" data-view="leads">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Todos los leads
      </div>
      <div onclick="navigate('leads/web_form')" class="nav-item pl-7 text-xs" data-view="leads/web_form">🌐 Formulario web</div>
      <div onclick="navigate('leads/manychat')" class="nav-item pl-7 text-xs" data-view="leads/manychat">💬 ManyChat</div>
      <div onclick="navigate('leads/instagram')" class="nav-item pl-7 text-xs" data-view="leads/instagram">📸 Instagram</div>
      <div onclick="navigate('leads/whatsapp')" class="nav-item pl-7 text-xs" data-view="leads/whatsapp">📱 WhatsApp</div>
      <div onclick="navigate('leads/linkedin')" class="nav-item pl-7 text-xs" data-view="leads/linkedin">💼 LinkedIn</div>
      <div onclick="navigate('leads/email')" class="nav-item pl-7 text-xs" data-view="leads/email">✉️ Email</div>
      <div onclick="navigate('leads/database_import')" class="nav-item pl-7 text-xs" data-view="leads/database_import">📂 Importación</div>

      <p class="nav-section">Agentes IA</p>
      <div onclick="navigate('agent/sdr')" class="nav-item" data-view="agent/sdr">
        <span class="text-lg leading-none">🎯</span> SDR
      </div>
      <div onclick="navigate('agent/analyst')" class="nav-item" data-view="agent/analyst">
        <span class="text-lg leading-none">🔍</span> Analista
      </div>
      <div onclick="navigate('agent/proposal')" class="nav-item" data-view="agent/proposal">
        <span class="text-lg leading-none">📋</span> Propuestas
      </div>
      <div onclick="navigate('agent/performance')" class="nav-item" data-view="agent/performance">
        <span class="text-lg leading-none">📈</span> Performance
      </div>
      <div onclick="navigate('agent/reporting')" class="nav-item" data-view="agent/reporting">
        <span class="text-lg leading-none">📊</span> Reporting
      </div>

      <p class="nav-section">Herramientas</p>
      <div onclick="navigate('calendar')" class="nav-item" data-view="calendar">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        Calendario
      </div>
      <div onclick="navigate('settings')" class="nav-item" data-view="settings">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Configuración
      </div>
    </nav>

    <!-- User -->
    <div class="border-t border-gray-800 px-4 py-3 flex items-center justify-between">
      <div>
        <p id="user-name" class="text-sm font-medium">—</p>
        <p id="user-email" class="text-xs text-gray-500">—</p>
      </div>
      <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition text-xs">Salir</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="ml-60 flex-1 min-h-screen">
    <div id="view-root" class="p-6 max-w-7xl mx-auto"></div>
  </main>

  <!-- Modal Lead -->
  <div id="lead-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg p-6 space-y-4 max-h-[90vh] overflow-y-auto">
      <div class="flex items-start justify-between">
        <h2 id="modal-name" class="font-semibold text-lg"></h2>
        <button onclick="closeModal()" class="text-gray-500 hover:text-white">✕</button>
      </div>
      <div id="modal-body"></div>
      <div class="border-t border-gray-800 pt-4">
        <p class="text-xs text-gray-500 mb-2">Cambiar estado</p>
        <div class="flex gap-2 flex-wrap" id="modal-status-buttons"></div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden fixed bottom-6 right-6 bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-sm z-50 shadow-xl"></div>

  <script src="/js/api.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/leads.js"></script>
  <script src="/js/views/agent.js"></script>
  <script src="/js/views/calendar.js"></script>
  <script src="/js/views/settings.js"></script>
  <script>
    // Auth check
    const token = localStorage.getItem('crm_token');
    if (!token) window.location.href = '/login.html';

    const user = JSON.parse(localStorage.getItem('crm_user') || '{}');
    document.getElementById('user-name').textContent = user.name || user.email || 'Admin';
    document.getElementById('user-email').textContent = user.email || '';

    function logout() {
      localStorage.removeItem('crm_token');
      localStorage.removeItem('crm_user');
      window.location.href = '/login.html';
    }

    // Router
    function navigate(view) {
      window.location.hash = view;
    }

    function renderView(hash) {
      const view = hash.replace('#', '') || 'dashboard';

      // Actualizar nav activo
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.view === view);
      });

      const root = document.getElementById('view-root');
      root.innerHTML = '<div class="flex items-center justify-center h-64 text-gray-500">Cargando...</div>';

      if (view === 'dashboard') return renderDashboard(root);
      if (view === 'calendar') return renderCalendar(root);
      if (view === 'settings') return renderSettings(root);
      if (view.startsWith('agent/')) return renderAgent(root, view.split('/')[1]);
      if (view.startsWith('leads')) {
        const source = view.includes('/') ? view.split('/')[1] : null;
        return renderLeads(root, source);
      }
    }

    window.addEventListener('hashchange', () => renderView(window.location.hash));
    renderView(window.location.hash || '#dashboard');

    // Modal
    let currentLeadId = null;
    function openLeadModal(lead) {
      currentLeadId = lead.id;
      document.getElementById('modal-name').textContent = lead.name || 'Sin nombre';
      document.getElementById('modal-body').innerHTML = renderLeadDetail(lead);
      const statuses = ['new','contacted','qualified','won','lost'];
      document.getElementById('modal-status-buttons').innerHTML = statuses.map(s => `
        <button onclick="changeLeadStatus('${lead.id}','${s}')"
          class="badge ${s === lead.status ? statusColors[s] : 'bg-gray-800 text-gray-500 border border-gray-700'} cursor-pointer hover:opacity-80 transition py-1 px-3">
          ${statusLabel[s]}
        </button>`).join('');
      document.getElementById('lead-modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('lead-modal').classList.add('hidden');
      currentLeadId = null;
    }
    document.getElementById('lead-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('lead-modal')) closeModal();
    });

    async function changeLeadStatus(id, status) {
      await api(`/api/leads/${id}/status`, { method: 'PATCH', body: { status } });
      closeModal();
      showToast(`Estado actualizado: ${statusLabel[status]}`);
      renderView(window.location.hash);
    }

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `fixed bottom-6 right-6 rounded-xl px-4 py-3 text-sm z-50 shadow-xl border ${
        type === 'error' ? 'bg-red-900/80 border-red-700 text-red-200' : 'bg-gray-800 border-gray-700 text-white'
      }`;
      t.classList.remove('hidden');
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    // Auto-refresh dashboard cada 60s
    setInterval(() => {
      if ((window.location.hash || '#dashboard') === '#dashboard') renderView('#dashboard');
    }, 60000);
  </script>
</body>
</html>
